<app-side-bar>
  <ng-container filters-full-size
    ><div class="space">
      <app-toggle-button
        [options]="['Summary', 'Products']"
        [selected]="'Products'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <div class="space">
      <app-date-range-picker
        [startDate]="startDate$ | async"
        [endDate]="endDate$ | async"
        minDate="2018-01-01"
        maxDate="2030-01-01"
        (valueChanged)="handleRangeChange($event)"
      />
    </div>
    <div class="space">
      <app-search-input (search)="onSearch($event)" />
    </div>
  </ng-container>

  <ng-container filters-partial-size> </ng-container>

  <ng-container main-content>
    @for( item of availableReceiptsProduct$ | async; track item.id ){
    <div>{{ item.name }}</div>
    }
  </ng-container>
</app-side-bar>
