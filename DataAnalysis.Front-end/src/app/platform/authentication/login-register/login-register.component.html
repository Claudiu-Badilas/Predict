<div class="background">
  <form
    [formGroup]="credentialForm"
    (ngSubmit)="onSubmitChanges(credentialForm)"
  >
    <h3 class="text-center">Login Here</h3>
    <label for="email">Email</label>
    <input
      class="form-control"
      type="email"
      placeholder="Email address"
      name="emailId"
      formControlName="email"
      [ngClass]="{
        'is-invalid': isValidateInputValue(credentialForm, 'email')
      }"
    />
    <span
      *ngIf="isValidateInputValue(credentialForm, 'email')"
      class="invalid-feedback d-flex position-absolute"
    >
      {{ getInputValidationError(credentialForm, "email") }}
    </span>
    <label for="password">Password</label>
    <input
      class="form-control"
      type="password"
      placeholder="Password"
      name="passwordId"
      formControlName="password"
      [ngClass]="{
        'is-invalid': isValidateInputValue(credentialForm, 'password')
      }"
    />
    <span
      *ngIf="isValidateInputValue(credentialForm, 'password')"
      class="invalid-feedback d-flex position-absolute"
    >
      {{ getInputValidationError(credentialForm, "password") }}
    </span>
    <button class="" type="submit" [disabled]="credentialForm.invalid">
      Log In
    </button>
    <div class="mt-3">
      You don't have an account, start journey with us from<b> here</b>
    </div>
  </form>
</div>
