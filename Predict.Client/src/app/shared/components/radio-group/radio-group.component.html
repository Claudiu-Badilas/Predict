@for (option of options; track $index) {
  <div class="d-flex form-check">
    <input
      type="radio"
      class="form-check-input"
      [value]="option.value"
      [formControl]="control"
      [checked]="option.value === selected"
      [id]="'radio-' + $index"
    />
    <label
      class="form-check-label"
      [for]="'radio-' + $index"
      (click)="selectOption(option.value)"
    >
      {{ option.label }}
    </label>
  </div>
}
