<div class="d-flex flex-column w-100">
  <div class="w-100 d-flex align-items-center pickers">
    <date-picker
      [initialDate]="startDate"
      [minDate]="minDate"
      [maxDate]="endDate"
      (dateChange)="onStartDateChange($event)"
    ></date-picker>

    <date-picker
      [initialDate]="endDate"
      [minDate]="startDate"
      [maxDate]="maxDate"
      (dateChange)="onEndDateChange($event)"
      openSide="right"
    ></date-picker>
  </div>
</div>
