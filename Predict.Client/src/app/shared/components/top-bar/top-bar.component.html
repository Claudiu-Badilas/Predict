<div class="top-bar">
  <!-- Logo -->
  <div class="left">
    <img class="logo-img" src="favicon.ico" alt="logo" />
    <span class="logo-name">PREDICT</span>
  </div>

  <!-- Desktop menu -->
  <div class="menu desktop">
    @for (option of modules; track option) {
      <div class="menu-item" (click)="onNavigateTo(option.url)">
        {{ option.name }}
      </div>
    }
  </div>

  <!-- Mobile hamburger -->
  <div class="mobile">
    <button class="hamburger" (click)="toggleMenu()">☰</button>
  </div>
</div>

<!-- Mobile dropdown menu -->
@if (isMenuOpen) {
  <div class="mobile-menu">
    @for (option of modules; track option) {
      <div class="menu-item" (click)="onNavigateTo(option.url)">
        {{ option.name }}
      </div>
    }
  </div>
}

<!-- Spacer to prevent content overlap -->
<div class="top-bar-spacer"></div>
