<p-side-bar>
  <ng-container filters-full-size
    ><div class="space">
      <p-toggle-button
        [options]="['Summary', 'Products']"
        [selected]="'Products'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <div class="space">
      <p-date-range-picker
        [startDate]="startDate$ | async"
        [endDate]="endDate$ | async"
        [minDate]="minDate"
        [maxDate]="now"
        (valueChanged)="handleRangeChange($event)"
      />
    </div>
    <div class="space">
      <p-search-input (search)="onSearch($event)" />
    </div>
  </ng-container>

  <ng-container main-content>
    <div>
      <p-highcharts-wrapper
        [chartOptions]="dailyPurchasedProductChart$ | async"
      />
    </div>
    <div class="mt-3">
      <p-highcharts-wrapper
        [chartOptions]="productPriceTrendChartUtils$ | async"
      />
    </div>
  </ng-container>
</p-side-bar>
