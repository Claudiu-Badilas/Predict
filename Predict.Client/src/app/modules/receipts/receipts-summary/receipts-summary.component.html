<p-top-bar>
  <ng-container module-navigation> </ng-container> </p-top-bar
><p-side-bar>
  <ng-container filters-full-size>
    <div class="space">
      <p-toggle-button
        [options]="['Summary', 'Products']"
        [selected]="'Summary'"
        (selectionChange)="onSelectionChange($event)"
      />
    </div>
    <div class="space">
      <p-date-range-picker
        [startDate]="startDate$ | async"
        [endDate]="endDate$ | async"
        [minDate]="minDate"
        [maxDate]="now"
        (valueChanged)="handleRangeChange($event)"
      />
    </div>
  </ng-container>

  <ng-container main-content>
    <p-receipts-list [receipts]="receipts$ | async" />
  </ng-container>
</p-side-bar>
