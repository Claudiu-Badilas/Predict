<div class="header-cards mb-3">
  <div class="divided-card">
    <div class="section">
      <p class="label"></p>
      <p class="value"></p>
    </div>
    <div class="divider"></div>
    <div class="section center">
      <p class="label"></p>
      <p class="value"></p>
    </div>
    <div class="divider"></div>
    <div class="section right">
      <p class="label"></p>
      <p class="value"></p>
    </div>
  </div>

  <div class="divided-card">
    <div class="section">
      <p class="label">Prima plata</p>
      <p class="value increase">
        {{ (firstInstalmentPaymentDate() | date: "MMM-yyyy") ?? "-" }}
      </p>
    </div>
    <div class="divider"></div>
    <div class="section center">
      <p class="label">Ultima plata</p>
      <p class="value decrease">
        {{ (lastInstalmentPaymentDate() | date: "MMM-yyyy") ?? "-" }}
      </p>
    </div>
    <div class="divider"></div>
    <div class="section center">
      <p class="label">Perioad Ramasa</p>
      <p class="value decrease">
        {{ dateDiffYMD() }}
      </p>
    </div>
    <div class="divider"></div>
    <div class="section right">
      <p class="label">Perioad Salvata</p>
      <p class="value increase">
        {{ savedDateDiffYMD() }}
      </p>
    </div>
  </div>
</div>
