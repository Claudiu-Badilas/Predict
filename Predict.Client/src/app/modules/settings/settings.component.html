<p-top-bar>
  <ng-container module-navigation></ng-container>
</p-top-bar>

<p-side-bar>
  <ng-container filters-full-size>
    @for (module of modules; track $index) {
      <div
        class="menu-item"
        [routerLink]="module.url"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ module.name }}
      </div>
    }
  </ng-container>

  <ng-container main-content>
    <router-outlet></router-outlet>
  </ng-container>
</p-side-bar>
